services:
  db:
    image: postgres:17-alpine
    container_name: zapnit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: zapnit
      POSTGRES_USER: zapnit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zapnit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zapnit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zapnit-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: zapnit-api
    restart: unless-stopped
    env_file: ./api/.env
    environment:
      WWEBJS_AUTH_PATH: /app/wwebjs_auth
    ports:
      - "3100:3100"
    volumes:
      - baileys_sessions:/app/sessions
      - wppweb_sessions:/app/wwebjs_auth
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: zapnit-worker
    restart: unless-stopped
    env_file: ./api/.env
    command: sh -c "node dist/worker.js"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.zapnit.frsolutions.pro}
    container_name: zapnit-app
    restart: unless-stopped
    env_file: ./app/.env
    ports:
      - "3002:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  baileys_sessions:
  wppweb_sessions:
